<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leitstelle Zugriff</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b0f1a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

.panel {
    width: 90%;
    max-width: 500px;
    background: #121a2a;
    padding: 20px;
    border-radius: 12px;
    text-align: center;
    border: 2px solid #1f2b45;
    z-index: 2;
}

h1 { color: #ff3b3b; }

input {
    width: 80%;
    padding: 12px;
    margin-top: 15px;
    border-radius: 8px;
}

button {
    margin-top: 15px;
    padding: 12px;
    background: red;
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

/* Blaulicht */
.flash {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle, rgba(255,0,0,0.2), transparent 40%),
                radial-gradient(circle, rgba(0,0,255,0.2), transparent 40%);
    animation: blink 0.4s infinite;
    opacity: 0;
    pointer-events: none;
}

@keyframes blink {
    0% {opacity: 0;}
    50% {opacity: 1;}
    100% {opacity: 0;}
}

/* Konfetti */
.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    top: -10px;
    animation: fall 3s linear forwards;
}

@keyframes fall {
    to {
        transform: translateY(110vh) rotate(360deg);
        opacity: 0;
    }
}
</style>
</head>

<body>

<div class="flash" id="flash"></div>

<div class="panel">
    <h1>🚒 Leitstelle Zugriff</h1>

    <input id="code" placeholder="CODE...">
    <button onclick="check()">Bestätigen</button>

    <div id="status">Warte auf Eingabe...</div>
</div>

<script>
function check() {
    const code = document.getElementById("code").value.trim();
    const status = document.getElementById("status");
    const flash = document.getElementById("flash");

    status.innerHTML = "🔍 Prüfe Code...";

    setTimeout(() => {

        if(code === "LEKJCI/Kiste/D1A2/225566/WWFM") {

            alert("✔ Zugriff erlaubt!");

            flash.style.opacity = "1";

            status.innerHTML = "📡 Verbindung wird hergestellt...";

            setTimeout(() => {
                status.innerHTML = "🎁 Geschenk wird lokalisiert...";
            }, 1200);

            setTimeout(() => {
                status.innerHTML = "📍 KOORDINATEN FREIGEGEBEN!";
                confetti();
            }, 2500);

            setTimeout(() => {
                window.location.href = "gift.html";
            }, 4500);

        } else {
            status.innerHTML = "❌ Zugriff verweigert!";
        }

    }, 800);
}

function confetti() {
    for(let i=0;i<80;i++){
        const c = document.createElement("div");
        c.classList.add("confetti");
        c.style.left = Math.random()*100 + "vw";
        c.style.background = ["red","blue","yellow","green"][Math.floor(Math.random()*4)];
        c.style.animationDuration = (2+Math.random()*2)+"s";
        document.body.appendChild(c);

        setTimeout(()=>c.remove(),4000);
    }
}
</script>

</body>
</html>
