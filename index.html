<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leitstelle Zugriff</title>

<style>
body {<h1>TEST 123</h1>    
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0f1a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

/* Blaulicht */
.siren {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    background: radial-gradient(circle, rgba(255,0,0,0.15), transparent 40%),
                radial-gradient(circle, rgba(0,0,255,0.15), transparent 40%);
    animation: flash 0.5s infinite;
    opacity: 0;
}

@keyframes flash {
    0% {opacity: 0;}
    50% {opacity: 1;}
    100% {opacity: 0;}
}

.panel {
    width: 90%;
    max-width: 500px;
    background: #121a2a;
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    border: 2px solid #1f2b45;
    z-index: 2;
}

h1 {
    color: #ff3b3b;
}

input {
    width: 80%;
    padding: 12px;
    margin-top: 15px;
    border-radius: 8px;
    border: none;
    font-size: 16px;
}

button {
    margin-top: 15px;
    padding: 12px 20px;
    border: none;
    border-radius: 8px;
    background: #ff3b3b;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

#status {
    margin-top: 20px;
    color: #9fb3d1;
}

/* Konfetti */
.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    background: red;
    top: -10px;
    animation: fall 3s linear forwards;
}

@keyframes fall {
    to {
        transform: translateY(110vh) rotate(360deg);
        opacity: 0;
    }
}
</style>
</head>

<body>

<div class="siren" id="siren"></div>

<div class="panel">
    <h1>🚒 Leitstelle Zugriff</h1>

    <input type="text" id="codeInput" placeholder="CODE...">
    <br>
    <button onclick="checkCode()">Bestätigen</button>

    <div id="status">Warte auf Eingabe...</div>
</div>

<script>
alert("SCRIPT LÄUFT");
</script>}

</body>
</html>
